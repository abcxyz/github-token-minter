version: 'minty.abcxyz.dev/v2'
rule:
  if: true

scope:
  minty_cross_org:
    rule:
      if: 'assertion.workflow_ref.startsWith("abcxyz/pkg/.github/workflows/test.yml")'
    repositories:
      - 'repoA'
      - 'repoB'
    permissions:
      contents: 'write'

  minty_error_test:
    rule:
      if: 'assertion.workflow_ref.startsWith("abcxyz/pkg/.github/workflows/test.yml")'
    repositories:
      - '422-repo'
      - '404-repo'
    permissions:
      contents: 'write'
